<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 鲜果超市</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #f5f0eb;
  color: #2d2d2d;
  min-height: 100vh;
}

/* Header */
header {
  background: linear-gradient(135deg, #e74c3c 0%, #c0392b 50%, #e67e22 100%);
  color: #fff;
  padding: 2rem 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
}
header h1 { font-size: 2.5rem; font-weight: 800; position: relative; letter-spacing: 0.05em; }
header p { font-size: 1.1rem; opacity: 0.9; margin-top: 0.3rem; position: relative; }

/* Cart bar */
.cart-bar {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #e0d6cd;
  padding: 0.8rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.cart-bar .cart-count {
  background: #e74c3c; color: #fff;
  border-radius: 999px; padding: 0.15rem 0.6rem;
  font-size: 0.85rem; font-weight: 600;
  margin-left: 0.4rem;
}
.cart-bar .total { font-weight: 700; color: #e74c3c; font-size: 1.15rem; }

/* Filter bar */
.filter-bar {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  padding: 1rem 1.5rem;
  background: #fff;
  border-bottom: 1px solid #eee;
}
.filter-btn {
  padding: 0.4rem 1rem;
  border: 1px solid #ddd; border-radius: 999px;
  background: #fff; cursor: pointer;
  font-size: 0.9rem; transition: all 0.2s;
}
.filter-btn:hover { border-color: #e74c3c; color: #e74c3c; }
.filter-btn.active { background: #e74c3c; color: #fff; border-color: #e74c3c; }

/* Product grid */
.container { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.5rem;
}

/* Card */
.card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  cursor: pointer;
  position: relative;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }

.card .img-wrap {
  width: 100%; aspect-ratio: 1;
  background: #faf6f2;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
}
.card .img-wrap img {
  width: 80%; height: 80%;
  object-fit: contain;
  transition: transform 0.4s ease;
}
.card:hover .img-wrap img { transform: scale(1.08); }

.card .badge {
  position: absolute;
  top: 0.75rem; left: 0.75rem;
  background: #e74c3c; color: #fff;
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  font-size: 0.75rem; font-weight: 600;
}

.card .info { padding: 1rem 1.2rem 1.2rem; }
.card .info h3 { font-size: 1.1rem; font-weight: 600; }
.card .info .origin {
  font-size: 0.85rem; color: #888; margin-top: 0.15rem;
}
.card .info .bottom {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 0.7rem;
}
.card .info .price {
  font-size: 1.3rem;
  font-weight: 700;
  color: #e74c3c;
}
.card .info .price .unit { font-size: 0.85rem; font-weight: 400; color: #999; }
.card .info .buy {
  background: linear-gradient(135deg, #e74c3c, #c0392b);
  color: #fff; border: none;
  padding: 0.5rem 1rem;
  border-radius: 999px;
  font-size: 0.85rem; font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
.card .info .buy:hover { opacity: 0.9; transform: scale(1.04); }
.card .info .buy:active { transform: scale(0.96); }

/* View cart button in cart-bar */
.view-cart-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  background: #fff;
  color: #e74c3c;
  border: 1.5px solid #e74c3c;
  padding: 0.4rem 1.1rem;
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-left: 0.8rem;
  position: relative;
}
.view-cart-btn:hover {
  background: #fdf2f0;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
}
.view-cart-btn:active {
  transform: translateY(0);
  box-shadow: none;
}

/* Toast */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: #2d2d2d; color: #fff;
  padding: 0.7rem 1.5rem;
  border-radius: 999px;
  font-size: 0.9rem;
  opacity: 0; transition: opacity 0.3s ease;
  pointer-events: none;
  z-index: 200;
}
.toast.show { opacity: 1; }

/* Cart panel */
.cart-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 380px; max-width: 100vw;
  background: #fff;
  box-shadow: -4px 0 30px rgba(0,0,0,0.15);
  z-index: 300;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s ease;
}
.cart-panel.open { transform: translateX(0); }
.cart-panel .header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 1.5rem;
  border-bottom: 1px solid #eee;
}
.cart-panel .header h2 { font-size: 1.2rem; }
.cart-panel .header .close {
  background: none; border: none; font-size: 1.5rem;
  cursor: pointer; color: #888;
}
.cart-panel .list { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
.cart-panel .list .empty {
  text-align: center; color: #bbb; margin-top: 3rem;
  font-size: 1.1rem;
}
.cart-item {
  display: flex; align-items: center; gap: 0.8rem;
  padding: 0.8rem 0; border-bottom: 1px solid #f0f0f0;
}
.cart-item img {
  width: 50px; height: 50px; object-fit: contain;
  background: #faf6f2; border-radius: 8px;
}
.cart-item .name { flex: 1; font-size: 0.95rem; }
.cart-item .qty {
  display: flex; align-items: center; gap: 0.4rem;
}
.cart-item .qty button {
  width: 26px; height: 26px;
  border-radius: 50%; border: 1px solid #ddd;
  background: #fff; cursor: pointer;
  font-size: 1rem; line-height: 1; display: flex;
  align-items: center; justify-content: center;
}
.cart-item .qty button:hover { border-color: #e74c3c; color: #e74c3c; }
.cart-item .qty span { width: 1.5rem; text-align: center; font-weight: 600; }
.cart-item .subtotal { font-weight: 700; color: #e74c3c; min-width: 3rem; text-align: right; }

.cart-panel .footer {
  padding: 1.2rem 1.5rem;
  border-top: 1px solid #eee;
  display: flex; align-items: center; justify-content: space-between;
}
.cart-panel .footer .total-label { font-weight: 600; }
.cart-panel .footer .total-amount { font-weight: 800; color: #e74c3c; font-size: 1.3rem; }
.cart-panel .footer .checkout {
  background: linear-gradient(135deg, #e74c3c, #c0392b);
  color: #fff; border: none;
  padding: 0.6rem 1.4rem; border-radius: 999px;
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
}
.cart-panel .footer .checkout:hover { opacity: 0.9; }

.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 299;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.show { opacity: 1; pointer-events: auto; }

/* Responsive */
@media (max-width: 640px) {
  header h1 { font-size: 1.8rem; }
  .container { padding: 1rem; }
  .grid { gap: 1rem; }
  .cart-panel { width: 100vw; }
}
</style>
</head>
<body>

<header>
  <h1>🍎 鲜果超市</h1>
  <p>每日新鲜直达 · 产地直供</p>
</header>

<div class="cart-bar">
  <div>
    🛒 <span>购物车</span>
    <span class="cart-count" id="cartCount">0</span>
  </div>
  <div>
    <span>合计: </span>
    <span class="total" id="cartTotal">¥0.00</span>
    <button class="view-cart-btn" onclick="toggleCart()">🛒 查看购物车</button>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-cat="all">全部</button>
</div>

<div class="container">
  <div class="grid" id="productGrid">
    <div class="empty">正在加载商品...</div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="header">
    <h2>🛒 购物车</h2>
    <button class="close" onclick="toggleCart()">✕</button>
  </div>
  <div class="list" id="cartList">
    <div class="empty">购物车还是空的</div>
  </div>
  <div class="footer">
    <div>
      <div class="total-label">合计</div>
      <div class="total-amount" id="cartPanelTotal">¥0.00</div>
    </div>
    <button class="checkout" onclick="checkout()">去结算</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── API Data ────────────────────────────────────────────
let fruits = [];
let categories = [];
const filterBar = document.getElementById('filterBar');

async function fetchJson(url, options) {
  const response = await fetch(url, options);
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  return response.json();
}

function renderFilters() {
  categories.forEach(({ cat, name }) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat;
    btn.textContent = '🍑 ' + name;
    btn.addEventListener('click', () => filter(cat, btn));
    filterBar.appendChild(btn);
  });
}

let activeFilter = 'all';
function filter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

filterBar.querySelector('[data-cat="all"]').addEventListener('click', function() {
  filter('all', this);
});

// ── Cart ────────────────────────────────────────────────
let cart = {};
function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCart();
  showToast('已加入购物车');
}

function removeFromCart(id) {
  if (cart[id]) cart[id]--;
  if (cart[id] <= 0) delete cart[id];
  updateCart();
}

async function getCartQuote() {
  return fetchJson('/api/cart/quote', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cart }),
  });
}

async function updateCart() {
  const { count, total } = await getCartQuote();
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = '¥' + total.toFixed(2);
  document.getElementById('cartPanelTotal').textContent = '¥' + total.toFixed(2);
  renderCart();
}

function renderCart() {
  const list = document.getElementById('cartList');
  const entries = Object.entries(cart);
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty">购物车还是空的</div>';
    return;
  }
  list.innerHTML = entries.map(([id, qty]) => {
    const f = fruits.find(x => x.id === +id);
    if (!f) return '';
    return `
      <div class="cart-item">
        <img src="${f.img}" alt="${f.name}" loading="lazy">
        <div>
          <div class="name">${f.name}</div>
          <div style="font-size:0.8rem;color:#888">¥${f.price.toFixed(2)}</div>
        </div>
        <div class="qty">
          <button onclick="removeFromCart(${f.id})">−</button>
          <span>${qty}</span>
          <button onclick="addToCart(${f.id})">+</button>
        </div>
        <div class="subtotal">¥${(f.price * qty).toFixed(2)}</div>
      </div>
    `;
  }).join('');
}

function toggleCart() {
  const panel = document.getElementById('cartPanel');
  const overlay = document.getElementById('overlay');
  const open = panel.classList.toggle('open');
  overlay.classList.toggle('show', open);
}

function checkout() {
  getCartQuote().then(({ total }) => {
    if (total === 0) { showToast('购物车是空的'); return; }
    const msg = `结算成功！共 ¥${total.toFixed(2)}，感谢光临 🎉`;
    showToast(msg);
    cart = {};
    updateCart();
  });
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Render ──────────────────────────────────────────────
function render() {
  const grid = document.getElementById('productGrid');
  const items = activeFilter === 'all'
    ? fruits
    : fruits.filter(f => f.cat === activeFilter);

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty">暂无商品</div>';
    return;
  }

  grid.innerHTML = items.map(f => {
    const inCart = cart[f.id] || 0;
    return `
      <div class="card" data-id="${f.id}">
        <div class="img-wrap">
          <img src="${f.img}" alt="${f.name}" loading="lazy">
        </div>
        <div class="info">
          <h3>${f.name}</h3>
          <div class="origin">📍 ${f.origin}</div>
          <div class="bottom">
            <div class="price">¥${f.price.toFixed(2)} <span class="unit">/ ${f.unit}</span></div>
            <button class="buy" onclick="addToCart(${f.id})">加入购物车</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function init() {
  try {
    [fruits, categories] = await Promise.all([
      fetchJson('/api/fruits'),
      fetchJson('/api/categories'),
    ]);
    renderFilters();
    render();
    updateCart();
  } catch (error) {
    document.getElementById('productGrid').innerHTML = '<div class="empty">商品加载失败，请稍后重试</div>';
    showToast('商品数据加载失败');
  }
}

init();
</script>
</body>
</html>
