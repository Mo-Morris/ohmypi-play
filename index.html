<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="鲜果超市：omp 最佳实践的连续演示项目" />
		<title>鲜果超市</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<header class="hero">
			<p class="eyebrow">ORCHARD TO TABLE</p>
			<h1>鲜果超市</h1>
			<p>每日新鲜直达 · 产地直供</p>
		</header>

		<div class="cart-bar">
			<div class="cart-summary" aria-live="polite">
				<span>🛒 购物车</span>
				<span class="cart-count" id="cartCount">0</span>
			</div>
			<div>
				<span>合计：</span>
				<strong class="total" id="cartTotal">¥0.00</strong>
				<button class="view-cart-btn" id="viewCartButton" type="button">查看购物车</button>
			</div>
		</div>

		<div class="search-bar">
			<label for="searchInput">搜索产地</label>
			<input id="searchInput" type="search" placeholder="例如：海南" autocomplete="off" />
		</div>

		<nav class="filter-bar" id="filterBar" aria-label="水果分类">
			<button class="filter-btn active" type="button" data-category="all">全部</button>
		</nav>

		<main class="container">
			<div class="grid" id="productGrid"></div>
		</main>

		<div class="overlay" id="overlay"></div>
		<aside class="cart-panel" id="cartPanel" aria-label="购物车" aria-hidden="true">
			<div class="panel-header">
				<h2>购物车</h2>
				<button class="close-button" id="closeCartButton" type="button" aria-label="关闭购物车">×</button>
			</div>
			<div class="cart-list" id="cartList"></div>
			<div class="panel-footer">
				<div>
					<span>合计</span>
					<strong id="cartPanelTotal">¥0.00</strong>
				</div>
				<button class="checkout-button" id="checkoutButton" type="button">去结算</button>
			</div>
		</aside>

		<div class="toast" id="toast" role="status" aria-live="polite"></div>
		<script type="module" src="/src/app.js"></script>
	</body>
</html>
